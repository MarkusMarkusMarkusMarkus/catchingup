<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Catch-Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a1a;
      --faint: #999;
      --rule: #e8e8e8;
      --bg: #fafaf8;
      --accent: #c8401a;
      --blue: #4169e1;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Libre Baskerville', Georgia, serif;
    }

    .shell {
      display: grid;
      grid-template-columns: 200px 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 2.4rem 3rem 1.6rem;
      border-bottom: 1px solid var(--rule);
    }

    .logo {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.05rem;
      font-weight: 700;
      font-style: italic;
      line-height: 1.2;
      text-align: right;
      text-decoration: none;
      color: var(--ink);
    }

    /* ── POST LIST (left) ── */
    .post-list {
      padding: 3rem 0;
      border-right: 1px solid var(--rule);
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .post-list::-webkit-scrollbar { display: none; }

    .post-list ul {
      list-style: none;
      display: flex;
      flex-direction: column-reverse;
      gap: 0.15rem;
      align-items: center;
    }

    .post-list li a {
      display: block;
      text-decoration: none;
      padding: 0.3rem 0;
      transition: opacity 0.15s;
    }

    .post-list li a:hover { opacity: 0.5; }

    .post-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 300;
      color: var(--blue);
      letter-spacing: 0.05em;
      white-space: nowrap;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── SEARCH AREA ── */
    .search-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      gap: 2.5rem;
      overflow: hidden;
    }

    .search-box-wrap {
      width: 100%;
      max-width: 520px;
    }

    .search-box-wrap input {
      width: 100%;
      font-family: 'Libre Baskerville', serif;
      font-size: 1rem;
      font-style: italic;
      color: var(--ink);
      background: transparent;
      border: none;
      border-bottom: 1.5px solid var(--ink);
      padding: 0.6rem 0;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box-wrap input::placeholder {
      color: var(--faint);
      font-style: italic;
    }

    .search-box-wrap input:focus {
      border-bottom-color: var(--accent);
    }

    .results {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .results::-webkit-scrollbar { display: none; }

    .result-card {
      border-left: 2px solid var(--rule);
      padding-left: 1.2rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .result-card:hover { border-left-color: var(--accent); }

    .result-card .r-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      font-weight: 300;
      color: var(--faint);
      letter-spacing: 0.08em;
      margin-bottom: 0.2rem;
    }

    .result-card .r-title {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 0.3rem;
    }

    .result-card .r-excerpt {
      font-size: 0.78rem;
      color: var(--faint);
      line-height: 1.6;
      font-style: italic;
    }

    .no-results {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--faint);
      letter-spacing: 0.05em;
      text-align: center;
      display: none;
    }

    @media (max-width: 680px) {
      .shell { grid-template-columns: 1fr; }
      .post-list { border-right: none; border-bottom: 1px solid var(--rule); }
      header { padding: 1.6rem 2rem 1.2rem; }
      .search-area { padding: 2rem; }
    }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <a href="/about.html" class="logo">Catching<br>Up</a>
  </header>

  <nav class="post-list">
    <ul id="postList"></ul>
  </nav>

  <main class="search-area">
    <div class="search-box-wrap">
      <input type="text" id="searchInput" placeholder="Search the field notes…" autocomplete="off">
    </div>
    <div class="results" id="results"></div>
    <p class="no-results" id="noResults">No field notes found.</p>
  </main>

</div>

<script>
  let posts = [];

  function renderList() {
    const listEl = document.getElementById('postList');
    listEl.innerHTML = '';
    [...posts].reverse().forEach(p => {
      const li = document.createElement('li');
      li.innerHTML = `<a href="${p.url}"><span class="post-num">#${p.id}</span></a>`;
      listEl.appendChild(li);
    });
  }

  function score(post, q) {
    const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
    let s = 0;
    terms.forEach(t => {
      if (post.title.toLowerCase().includes(t)) s += 12;
      if ((post.excerpt||'').toLowerCase().includes(t)) s += 6;
      (post.keywords||[]).forEach(k => {
        if (k === t) s += 5;
        else if (k.includes(t)) s += 2;
      });
    });
    return s;
  }

  async function init() {
    try {
      const res = await fetch('posts.json');
      posts = await res.json();
    } catch(e) {
      console.warn('Could not load posts.json — run build.js first.');
    }
    renderList();

    const input = document.getElementById('searchInput');
    const resultsEl = document.getElementById('results');
    const noResults = document.getElementById('noResults');

    input.addEventListener('input', () => {
      const q = input.value.trim();
      resultsEl.innerHTML = '';
      noResults.style.display = 'none';
      if (!q) return;

      const scored = posts
        .map(p => ({ post: p, s: score(p, q) }))
        .filter(x => x.s > 0)
        .sort((a, b) => b.s - a.s)
        .slice(0, 4);

      if (!scored.length) { noResults.style.display = 'block'; return; }

      scored.forEach(({ post: p }) => {
        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `<div class="r-num">#${p.id}</div><div class="r-title">${p.title}</div><div class="r-excerpt">${p.excerpt||''}</div>`;
        card.addEventListener('click', () => window.location.href = p.url);
        resultsEl.appendChild(card);
      });
    });
  }

  init();
</script>
</body>
</html>
