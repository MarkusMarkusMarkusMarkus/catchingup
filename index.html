<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Catch-Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a1a;
      --faint: #999;
      --rule: #e8e8e8;
      --bg: #fafaf8;
      --accent: #c8401a;
      --blue: #4169e1;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Libre Baskerville', Georgia, serif;
    }

    .shell {
      display: grid;
      grid-template-columns: 200px 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 2.4rem 3rem 1.6rem;
      border-bottom: 1px solid var(--rule);
    }

    .logo {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.05rem;
      font-weight: 700;
      font-style: italic;
      line-height: 1.2;
      text-align: right;
      text-decoration: none;
      color: var(--ink);
    }

    /* ── POST LIST (left) ── */
    .post-list {
      padding: 3rem 0 0.5rem 0;
      border-right: 1px solid var(--rule);
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .post-list::-webkit-scrollbar { display: none; }

    .post-list ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      align-items: center;
    }

    .post-list li a {
      display: block;
      text-decoration: none;
      padding: 0.3rem 0;
      transition: opacity 0.15s;
    }

    .post-list li a:hover { opacity: 0.5; }

    .post-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 300;
      color: var(--blue);
      letter-spacing: 0.05em;
      white-space: nowrap;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .post-num-dead {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 300;
      color: var(--rule);
      letter-spacing: 0.05em;
      white-space: nowrap;
      cursor: default;
      display: block;
      padding: 0.3rem 0;
    }

    /* ── SEARCH AREA ── */
    .search-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      gap: 2.5rem;
      overflow: hidden;
    }

    .search-box-wrap {
      width: 100%;
      max-width: 520px;
    }

    .search-box-wrap input {
      width: 100%;
      font-family: 'Libre Baskerville', serif;
      font-size: 1rem;
      font-style: italic;
      color: var(--ink);
      background: transparent;
      border: none;
      border-bottom: 1.5px solid var(--ink);
      padding: 0.6rem 0;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box-wrap input::placeholder {
      color: var(--faint);
      font-style: italic;
    }

    .search-box-wrap input:focus {
      border-bottom-color: var(--accent);
    }

    .results {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .results::-webkit-scrollbar { display: none; }

    .result-card {
      border-left: 2px solid var(--rule);
      padding-left: 1.2rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .result-card:hover { border-left-color: var(--accent); }

    .result-card .r-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      font-weight: 300;
      color: var(--faint);
      letter-spacing: 0.08em;
      margin-bottom: 0.2rem;
    }

    .result-card .r-title {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 0.3rem;
    }

    .result-card .r-excerpt {
      font-size: 0.78rem;
      color: var(--faint);
      line-height: 1.6;
      font-style: italic;
    }

    .no-results {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--faint);
      letter-spacing: 0.05em;
      text-align: center;
      display: none;
    }

    @media (max-width: 680px) {
      .shell { grid-template-columns: 1fr; }
      .post-list { border-right: none; border-bottom: 1px solid var(--rule); }
      header { padding: 1.6rem 2rem 1.2rem; }
      .search-area { padding: 2rem; }
    }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <a href="/about.html" class="logo">Catching<br>Up</a>
  </header>

  <nav class="post-list">
    <ul id="postList"></ul>
  </nav>

  <main class="search-area">
    <div class="search-box-wrap">
      <input type="text" id="searchInput" placeholder="Search the field notes…" autocomplete="off">
    </div>
    <div class="results" id="results"></div>
    <p class="no-results" id="noResults">No field notes found.</p>
  </main>

</div>

<script>
  const posts = [
    { id:"01", title:"Getting It", url:"posts/01-getting-it.html", summary:"The moment GenAI clicked — not as a tool but as something qualitatively different. The feeling of understanding something that can't quite be explained.", keywords:["click moment","understanding","superincreasing sequence","intuition","GenAI","getting it","revelation"] },
    { id:"02", title:"Innovative Laggard", url:"posts/02-innovative-laggard.html", summary:"Being late to GenAI relative to your Twitter feed but early relative to the world. The fractal nature of adoption curves.", keywords:["adoption curve","early adopter","laggard","Twitter","social graph","relative","timing"] },
    { id:"03", title:"Becoming Unbounded", url:"posts/03-becoming-unbounded.html", summary:"When AI removes the skill bottleneck, you're no longer limited by what you can do — only by what you can imagine.", keywords:["skill bottleneck","imagination","creativity","unbounded","execution","constraints","capability","barrier","unlock"] },
    { id:"04", title:"Egregores", url:"posts/04-egregores.html", summary:"What is a group mind, really? Using the card game The Mind as a live experiment in collective intelligence and silent coordination.", keywords:["egregore","group mind","hive","collective intelligence","cooperation","silent","tulpa","thoughtform","occult","meme","game","Mind"] },
    { id:"05", title:"Pixel Art Dreams", url:"posts/05-pixel-art-dreams.html", summary:"Midjourney bleeding into dreams and back. The model starts shaping how you see before you're even awake.", keywords:["dreams","freud","unconscious","sleep","perception","pixel art","midjourney","bleed","psyche","vision","night","subconscious","hallucination","surreal"] },
    { id:"06", title:"The Merge", url:"posts/06-the-merge.html", summary:"Failed projects combining into a natural save point. When the graveyard becomes the foundation.", keywords:["failure","projects","save point","merge","combine","graveyard","foundation","dead","restart","pivot","hellboy","mignola"] },
    { id:"07", title:"Bricoleur", url:"posts/07-bricoleur.html", summary:"Scraps of failed projects becoming successful ones. The French concept of making do with what's at hand.", keywords:["bricolage","bricoleur","making do","scraps","repurpose","recycle","creativity","levi-strauss","anthropology","craft","hack","improvise","salvage"] },
    { id:"08", title:"History of Creativity", url:"posts/08-history-of-creativity.html", summary:"Midjourney already contains the creative lineage you wanted to trace. The whole loop is already inside.", keywords:["creativity","history","lineage","canon","training data","inheritance","influence","art","style","loop","inside","already","tradition"] },
    { id:"09", title:"Seeing like a Prompter", url:"posts/09-seeing-like-a-prompter.html", summary:"Perceiving the world as potential prompts. A new perceptual filter that changes what you notice.", keywords:["perception","prompting","seeing","midjourney","filter","awareness","attention","framing","describe","language","eye","notice","observe","lens"] },
    { id:"10", title:"We Are All Kids Now", url:"posts/10-we-are-all-kids-now.html", summary:"Thomas Romain turned his kid's doodles into anime. Now AI does that for everyone. The execution gap is closed.", keywords:["kids","children","doodle","anime","thomas romain","father","imagination","execute","parent","draw","potential","play","innocent","gap"] },
    { id:"11", title:"Oneshotting", url:"posts/11-oneshotting.html", summary:"The calibration reflex — just try the hard thing first. The cost of asking has collapsed.", keywords:["oneshot","calibration","reflex","easy hard","cost","try","ask","attempt","first","boldness","prompt","edge"] },
    { id:"12", title:"Someday/Maybe", url:"posts/12-someday-maybe.html", summary:"Dead ideas resurrected by AI. The Dunkinator lives. Someday/Maybe has arrived.", keywords:["resurrection","dead ideas","dunkinator","someday maybe","GTD","backlog","revival","graveyard","old project","forgotten","retrieve"] },
    { id:"13", title:"Breadcrumbs", url:"posts/13-breadcrumbs.html", summary:"Borges as proxy-executor of ideas you couldn't yet build. AI as the reader who finally completes the text.", keywords:["Borges","ideas","execution","proxy","worlds","simulation","literature","breadcrumbs","labyrinth","infinite","writing"] },
    { id:"14", title:"Blue Light", url:"posts/14-blue-light.html", summary:"Dreams to Midjourney to game concept to Claude mockup. The creative chain that runs through sleep.", keywords:["dreams","midjourney","game","mockup","claude","creative chain","blue light","screen","zombie","pixel art","gothic horror","entranced"] },
    { id:"15", title:"A 4000 Year Run", url:"posts/15-a-4000-year-run.html", summary:"The canon is now finite. Everything ever written is inside the model. So I started at the beginning.", keywords:["canon","literature","finite","chatgpt","reading","bible","beginning","4000 year run","history","classics","ancient","completable"] },
    { id:"16", title:"The Studio", url:"posts/16-the-studio.html", summary:"Jeff Koons doesn't make his art — he directs it. Disappointing until you realize AI makes us all PMs now.", keywords:["studio","jeff koons","product manager","pm","artist","creative direction","assistant","factory","we are all pms now","disappointing"] },
    { id:"17", title:"Emoji Sigils", url:"posts/17-emoji-sigils.html", summary:"Compressing entire narratives into emoji sequences. The Iliad in four rows. A new kind of literary shorthand.", keywords:["emoji","sigil","compress","story","genesis","iliad","odyssey","hamlet","symbol","chatgpt","bible","narrative","reduction","glyph","icon"] },
    { id:"18", title:"Reading Simulator 9000", url:"posts/18-reading-simulator-9000.html", summary:"The opportunity cost of finishing books you're not sure about. A fictional device for outsourcing that decision.", keywords:["reading","simulator","book","finish","opportunity cost","guilt","recommendation","taste","simulation","abandon","should i continue"] },
    { id:"19", title:"MVC", url:"posts/19-mvc.html", summary:"Minimum viable creativity. Borges, Hemingway's baby shoes, and the question of how little is enough.", keywords:["mvc","minimum viable creativity","borges","hemingway","baby shoes","brevity","micro fiction","six words","enough","lean","flash fiction"] },
    { id:"20", title:"Cambrian Explosion", url:"posts/20-cambrian-explosion.html", summary:"The internet was wild, then platforms flattened it. AI is lowering the cost of making again — a new explosion of expression.", keywords:["cambrian explosion","internet","platform","creativity","skill barrier","wild west","geocities","flatten","democratize","myspace","expression","cost"] },
    { id:"21", title:"Single-player Mode", url:"posts/21-single-player-mode.html", summary:"A solo operator with AI can now do what previously required a small company. Pieter Levels was just early.", keywords:["solo","startup","single player","pieter levels","headcount","one person company","operator","replace team","indie","org chart","power law"] },
    { id:"22", title:"Bespoke Software", url:"posts/22-bespoke-software.html", summary:"Why use software built for the modal user when you can build exactly what you need? Claude Code makes this real.", keywords:["bespoke software","claude code","obsidian","custom","modal user","security","build your own tool","tailored","fit","personal"] },
    { id:"23", title:"Stewie Was Wrong", url:"posts/23-stewie-was-wrong.html", summary:"Stewie Griffin thought curation was a cop-out. But a Midjourney prompt is exactly 'a pinch of this, a pinch of that'.", keywords:["curation","creativity","taste","archive","midjourney","family guy","stewie","pinterest","personality","collection","memory","influence","fool"] },
    { id:"24", title:"Inverse Science", url:"posts/24-inverse-science.html", summary:"Classical science: observe, theorize, build. AI inverts this — build first, discover later. We made it without understanding it.", keywords:["science","ai","inverse","black box","emergence","methodology","hypothesis","interpretability","discover","unknown","explain","understand"] },
    { id:"25", title:"The Prompter Is the Prompted", url:"posts/25-the-prompter-is-the-prompted.html", summary:"Every image you generate in Midjourney changes what you prompt next. The tool is prompting you back.", keywords:["prompt","feedback loop","midjourney","reciprocal","dialogue","two-way","influence","reverse","who prompts whom","change your mind"] },
    { id:"26", title:"Scriptorium", url:"posts/26-scriptorium.html", summary:"Medieval monks illuminated manuscripts to make knowledge beautiful. Claude can do that now. Why not?", keywords:["aristotle","illuminated manuscript","scriptorium","medieval monks","gold","vellum","beauty","philosophy","ancient","wikipedia","decorate","why not"] },
    { id:"27", title:"Dying by Inches", url:"posts/27-dying-by-inches.html", summary:"Darwin was dying by inches without anyone to talk insects with. That's how GenAI feels — no campfire, no community.", keywords:["darwin","community","campfire","midjourney","metis","practical knowledge","forum","lonely","tribe","naturalist","share","discuss","dying by inches"] },
    { id:"28", title:"Imaginal Amputees", url:"posts/28-imaginal-amputees.html", summary:"For the first time in history imagination is no longer the bottleneck. We were all imaginal amputees and didn't know it.", keywords:["imagination","skill","childhood","bottleneck","amputee","execution","human history","dream","limit","ideas","everything around you","first time"] },
    { id:"29", title:"Is It Still There?", url:"posts/29-is-it-still-there.html", summary:"A fiction: digital books can be silently edited. Paper becomes incorruptible. Borges, Orwell, Lisbon.", keywords:["fiction","censorship","digital","paper","borges","lisbon","memory","truth","disappear","rewrite history","incorruptible","ink","1984","orwell","ai-written"] },
    { id:"30", title:"Original Sin", url:"posts/30-original-sin.html", summary:"Anthropic accused labs of stealing training data. The internet sided with the thieves. Illegal but not immoral?", keywords:["anthropic","ip","copyright","training data","deepseek","morality","theft","original sin","piracy","scrape","fair use","illegal","immoral","portuguese"] },
    { id:"31", title:"Midjourney Gospel", url:"posts/31-midjourney-gospel.html", summary:"Ten commandments for working with generative AI. Non-attachment, grace, letting go of outcomes.", keywords:["commandment","gospel","midjourney","non-attachment","zen","grace","law","religion","bible","discipline","detach","outcome","ten","practice"] }
  ];

  function renderList() {
    const listEl = document.getElementById('postList');
    listEl.innerHTML = '';
    const published = {};
    posts.forEach(p => { published[p.id] = p; });

    for (let i = 99; i >= 1; i--) {
      const id = String(i).padStart(2, '0');
      const li = document.createElement('li');
      if (published[id]) {
        li.innerHTML = `<a href="${published[id].url}"><span class="post-num">#${id}</span></a>`;
      } else {
        li.innerHTML = `<span class="post-num-dead">#${id}</span>`;
      }
      listEl.appendChild(li);
    }
  }

  function score(post, q) {
    const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
    let s = 0;
    terms.forEach(t => {
      if (post.title.toLowerCase().includes(t)) s += 12;
      if ((post.summary||'').toLowerCase().includes(t)) s += 5;
      (post.keywords||[]).forEach(k => {
        if (k === t) s += 5;
        else if (k.includes(t)) s += 2;
      });
    });
    return s;
  }

  renderList();
  const postListEl = document.querySelector('.post-list');
  postListEl.scrollTop = postListEl.scrollHeight;

  const input = document.getElementById('searchInput');
  const resultsEl = document.getElementById('results');
  const noResults = document.getElementById('noResults');

  input.addEventListener('input', () => {
    const q = input.value.trim();
    resultsEl.innerHTML = '';
    noResults.style.display = 'none';
    if (!q) return;

    const scored = posts
      .map(p => ({ post: p, s: score(p, q) }))
      .filter(x => x.s > 0)
      .sort((a, b) => b.s - a.s)
      .slice(0, 4);

    if (!scored.length) { noResults.style.display = 'block'; return; }

    scored.forEach(({ post: p }) => {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `<div class="r-num">#${p.id}</div><div class="r-title">${p.title}</div><div class="r-excerpt">${p.summary||''}</div>`;
      card.addEventListener('click', () => window.location.href = p.url);
      resultsEl.appendChild(card);
    });
  });
</script>
</body>
</html>
