<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Catch-Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a1a;
      --faint: #999;
      --rule: #e8e8e8;
      --bg: #fafaf8;
      --accent: #c8401a;
      --blue: #4169e1;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Libre Baskerville', Georgia, serif;
    }

    .shell {
      display: grid;
      grid-template-columns: 200px 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 2.4rem 3rem 1.6rem;
      border-bottom: 1px solid var(--rule);
    }

    .logo {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.05rem;
      font-weight: 700;
      font-style: italic;
      line-height: 1.2;
      text-align: right;
      text-decoration: none;
      color: var(--ink);
    }

    /* ── POST LIST (left) ── */
    .post-list {
      padding: 3rem 0;
      border-right: 1px solid var(--rule);
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .post-list::-webkit-scrollbar { display: none; }

    .post-list ul {
      list-style: none;
      display: flex;
      flex-direction: column-reverse;
      gap: 0.15rem;
      align-items: center;
    }

    .post-list li a {
      display: block;
      text-decoration: none;
      padding: 0.3rem 0;
      transition: opacity 0.15s;
    }

    .post-list li a:hover { opacity: 0.5; }

    .post-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 300;
      color: var(--blue);
      letter-spacing: 0.05em;
      white-space: nowrap;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── SEARCH AREA ── */
    .search-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      gap: 2.5rem;
      overflow: hidden;
    }

    .search-box-wrap {
      width: 100%;
      max-width: 520px;
    }

    .search-box-wrap input {
      width: 100%;
      font-family: 'Libre Baskerville', serif;
      font-size: 1rem;
      font-style: italic;
      color: var(--ink);
      background: transparent;
      border: none;
      border-bottom: 1.5px solid var(--ink);
      padding: 0.6rem 0;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box-wrap input::placeholder {
      color: var(--faint);
      font-style: italic;
    }

    .search-box-wrap input:focus {
      border-bottom-color: var(--accent);
    }

    .results {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .results::-webkit-scrollbar { display: none; }

    .result-card {
      border-left: 2px solid var(--rule);
      padding-left: 1.2rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .result-card:hover { border-left-color: var(--accent); }

    .result-card .r-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      font-weight: 300;
      color: var(--faint);
      letter-spacing: 0.08em;
      margin-bottom: 0.2rem;
    }

    .result-card .r-title {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 0.3rem;
    }

    .result-card .r-excerpt {
      font-size: 0.78rem;
      color: var(--faint);
      line-height: 1.6;
      font-style: italic;
    }

    .no-results {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--faint);
      letter-spacing: 0.05em;
      text-align: center;
      display: none;
    }

    @media (max-width: 680px) {
      .shell { grid-template-columns: 1fr; }
      .post-list { border-right: none; border-bottom: 1px solid var(--rule); }
      header { padding: 1.6rem 2rem 1.2rem; }
      .search-area { padding: 2rem; }
    }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <a href="/about.html" class="logo">Catching<br>Up</a>
  </header>

  <nav class="post-list">
    <ul id="postList"></ul>
  </nav>

  <main class="search-area">
    <div class="search-box-wrap">
      <input type="text" id="searchInput" placeholder="Search the field notes…" autocomplete="off">
    </div>
    <div class="results" id="results"></div>
    <p class="no-results" id="noResults">No field notes found.</p>
  </main>

</div>

<script>
  const posts = [
    { id:"01", title:"Getting it", url:"posts/getting-it.html", excerpt:"The moment GenAI clicked — not as a tool but as something qualitatively different.", keywords:["click","moment","understand","intuition","genai","superincreasing","sequence","revelation","epiphany","finally","mathematics","exponential","feel","sense"] },
    { id:"02", title:"Innovative Laggard", url:"posts/innovative-laggard.html", excerpt:"Being late to GenAI relative to your Twitter feed — but early relative to the world.", keywords:["adoption","curve","early","adopter","laggard","twitter","social","timing","late","ahead","behind","diffusion","innovation","technology","relative","bell curve"] },
    { id:"03", title:"Becoming Unbounded", url:"posts/becoming-unbounded.html", excerpt:"When AI removes the skill bottleneck, you're no longer limited by what you can do — only by what you can imagine.", keywords:["skill","bottleneck","imagination","creativity","unbounded","execution","constraint","limit","free","capability","barrier","unlock","potential","vibe","code"] },
    { id:"04", title:"Pixel Art Dreams", url:"posts/pixel-art-dreams.html", excerpt:"Midjourney started bleeding into my dreams. The model shapes how you see before you're even awake.", keywords:["dreams","freud","unconscious","sleep","perception","pixel","art","midjourney","bleed","psyche","vision","night","subconscious","see","hallucination","surreal"] },
    { id:"05", title:"The Merge", url:"posts/the-merge.html", excerpt:"Failed projects combining into a natural save point. When the graveyard becomes the foundation.", keywords:["failure","project","save","point","merge","combine","graveyard","foundation","dead","restart","pivot","git","version","control","start","over"] },
    { id:"06", title:"Bricoleur", url:"posts/bricoleur.html", excerpt:"Scraps of failed projects becoming successful ones. Making do with what's at hand.", keywords:["bricolage","bricoleur","making","do","scraps","repurpose","recycle","creativity","levi-strauss","anthropology","craft","hack","improvise","salvage","reuse","found","material"] },
    { id:"07", title:"History of Creativity", url:"posts/history-of-creativity.html", excerpt:"Midjourney already contains the creative lineage I wanted to trace. The whole loop is already inside.", keywords:["creativity","history","lineage","canon","training","data","inheritance","influence","art","style","movement","loop","inside","already","contained","tradition"] },
    { id:"08", title:"Seeing like a Prompter", url:"posts/seeing-like-a-prompter.html", excerpt:"I was starting to see the world as potential prompts.", keywords:["perception","prompt","see","world","filter","attention","awareness","midjourney","framing","describe","language","eye","look","notice","observe","lens"] },
    { id:"09", title:"Oneshotting", url:"posts/oneshotting.html", excerpt:"The calibration reflex — just try the hard thing first. The cost of asking has collapsed.", keywords:["oneshot","calibration","reflex","easy","hard","cost","try","ask","attempt","first","boldness","prompt","edge","worst","happens"] },
    { id:"10", title:"Someday/Maybe", url:"posts/someday-maybe.html", excerpt:"Dead ideas resurrected by AI. Someday/Maybe has arrived.", keywords:["resurrection","dead","ideas","dunkinator","someday","maybe","gtd","backlog","revival","graveyard","old","project","forgotten","list","future","retrieve"] },
    { id:"11", title:"Breadcrumbs", url:"posts/breadcrumbs.html", excerpt:"Borges as proxy-executor of ideas I couldn't yet build. Now it's easy to simulate worlds.", keywords:["borges","proxy","executor","ideas","worlds","simulate","fiction","literature","library","babel","infinite","impossible","build","now","easy","complete"] },
    { id:"12", title:"Blue Light", url:"posts/blue-light.html", excerpt:"Dreams to Midjourney to game concept to Claude mockup. The creative chain that runs through sleep.", keywords:["dreams","freud","blue","light","midjourney","game","mockup","claude","chain","sleep","night","vision","creative","loop","screen","entranced"] },
    { id:"13", title:"A 4000 Year Run", url:"posts/4000-year-run.html", excerpt:"The canon is now finite. Everything ever written is inside the model. So I started at the beginning.", keywords:["canon","finite","bible","history","literature","training","data","beginning","start","ancient","text","4000","years","human","writing","contained","scripture"] },
    { id:"14", title:"We Are All PMs Now", url:"posts/we-are-all-pms-now.html", excerpt:"The artist/friends/you-with-Claude reversal. I guess we are all PMs now.", keywords:["product","manager","pm","studio","artist","claude","creative","direction","delegate","spec","brief","employer","employee","role","reversal","manage"] },
    { id:"15", title:"Emoji Sigils", url:"posts/emoji-sigils.html", excerpt:"Emojis as a prompt language. The grid is the argument.", keywords:["emoji","sigil","symbol","prompt","language","grid","magic","occult","icon","midjourney","shorthand","code","visual","glyph","arcane"] },
    { id:"16", title:"Reading Simulator 9000", url:"posts/reading-simulator.html", excerpt:"A fictional device for the opportunity cost of finishing bad books.", keywords:["reading","book","opportunity","cost","fiction","simulator","quit","finish","bad","time","value","worth","sunk","fallacy","abandon"] },
    { id:"17", title:"MVC", url:"posts/mvc.html", excerpt:"Borges quote. Three links. For sale: baby shoes, never worn.", keywords:["borges","mvc","minimum","viable","baby","shoes","hemingway","brevity","short","micro","flash","fiction","six","words","enough"] },
    { id:"18", title:"Cambrian Explosion", url:"posts/cambrian-explosion.html", excerpt:"The internet was the Wild West. Then platforms flattened everything. AI is lowering the cost of making again.", keywords:["cambrian","explosion","internet","platform","creativity","skill","barrier","workflow","wild","west","geocities","flatten","democratize","make","cost","myspace"] },
    { id:"19", title:"Single-player Mode", url:"posts/single-player-mode.html", excerpt:"A solo operator with AI can now do what previously required a small company. Pieter Levels was just early.", keywords:["solo","startup","agent","org","chart","single","player","pieter","levels","headcount","company","one","person","operator","replace","team","indie"] },
    { id:"20", title:"Cheap Weird Things", url:"posts/cheap-weird-things.html", excerpt:"Low capital costs let you make the weird thing. Anime proved it. AI is the next step on that curve.", keywords:["anime","capital","cost","niche","weird","culture","avant-garde","production","cheap","japan","manga","mainstream","market","mass","indie","strange","obscure"] },
    { id:"21", title:"Bespoke Software", url:"posts/bespoke-software.html", excerpt:"Why use software built for the modal user when you can build exactly what you need?", keywords:["bespoke","software","claude","code","obsidian","custom","modal","security","malware","extension","chrome","build","own","tool","tailored","fit"] },
    { id:"22", title:"Stewie Was Wrong", url:"posts/stewie-was-wrong.html", excerpt:"What is a Midjourney prompt if not 'a pinch of this, a pinch of that'?", keywords:["curation","creativity","taste","archive","midjourney","family","guy","stewie","prompt","facebook","likes","personality","collection","record","memory","influence"] },
    { id:"23", title:"The Prompter Is the Prompted", url:"posts/prompter-prompted.html", excerpt:"Are you prompting it for answers? Or is it prompting you for questions?", keywords:["prompt","feedback","loop","midjourney","reciprocal","image","question","weight","change","mind","influence","reverse","who","whom","dialogue","two-way"] },
    { id:"24", title:"Dying by Inches", url:"posts/dying-by-inches.html", excerpt:"Darwin was dying by inches from not having anyone to talk to about insects. That is exactly how I felt about GenAI.", keywords:["darwin","community","field","note","campfire","midjourney","metis","knowledge","forum","social","talk","discuss","share","lonely","find","tribe","insects","naturalist"] },
    { id:"25", title:"Imaginal Amputees", url:"posts/imaginal-amputees.html", excerpt:"For the first time in human history our imagination is not the bottleneck anymore.", keywords:["imagination","skill","childhood","bottleneck","amputee","execution","history","first","time","human","dream","kid","grow","up","limit","cut","down"] },
    { id:"26", title:"Midjourney Gospel", url:"posts/midjourney-gospel.html", excerpt:"Ten commandments for working with generative AI. Thou shalt give grace.", keywords:["commandment","gospel","midjourney","non-attachment","zen","principle","grace","rule","law","religion","bible","thou","shalt","practice","discipline","detach","outcome"] },
    { id:"27", title:"Original Sin", url:"posts/original-sin.html", excerpt:"Anthropic accused labs of stealing. The internet sided with the thieves. Illegal — but not immoral?", keywords:["anthropic","ip","copyright","training","data","deepseek","morality","theft","steal","sin","original","piracy","scrape","fair","use","illegal","immoral","portuguese"] },
    { id:"28", title:"Scriptorium", url:"posts/scriptorium.html", excerpt:"Opened Aristotle's Metaphysics by accident. And then it hit me — why not?", keywords:["aristotle","illuminate","manuscript","scriptorium","book","design","beauty","medieval","monks","gold","vellum","pretty","pictures","philosophy","ancient","why","not"] },
    { id:"29", title:"Is It Still There?", url:"posts/is-it-still-there.html", excerpt:"Every year the digital texts grow lighter and clearer. Every year the paper books grow heavier with reality.", keywords:["fiction","book","censorship","digital","paper","borges","lisbon","memory","truth","edit","silent","disappear","rewrite","history","incorruptible","ink","1984","orwell"] },
    { id:"30", title:"Inverse Science", url:"posts/inverse-science.html", excerpt:"Classical science: observe, theorize, test, build. AI inverts this. Build, test, discover — then what?", keywords:["science","ai","discover","inverse","understand","emerge","method","build","test","observe","theory","hypothesis","unknown","explain","why","how","black","box"] }
  ];

  const listEl = document.getElementById('postList');
  posts.forEach(p => {
    const li = document.createElement('li');
    li.innerHTML = `<a href="${p.url}"><span class="post-num">#${p.id}</span></a>`;
    listEl.appendChild(li);
  });

  function score(post, q) {
    const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
    let s = 0;
    terms.forEach(t => {
      if (post.title.toLowerCase().includes(t)) s += 12;
      if (post.excerpt.toLowerCase().includes(t)) s += 6;
      post.keywords.forEach(k => {
        if (k === t) s += 5;
        else if (k.includes(t)) s += 2;
      });
    });
    return s;
  }

  const input = document.getElementById('searchInput');
  const resultsEl = document.getElementById('results');
  const noResults = document.getElementById('noResults');

  input.addEventListener('input', () => {
    const q = input.value.trim();
    resultsEl.innerHTML = '';
    noResults.style.display = 'none';
    if (!q) return;

    const scored = posts
      .map(p => ({ post: p, s: score(p, q) }))
      .filter(x => x.s > 0)
      .sort((a, b) => b.s - a.s)
      .slice(0, 4);

    if (!scored.length) { noResults.style.display = 'block'; return; }

    scored.forEach(({ post: p }) => {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `<div class="r-num">#${p.id}</div><div class="r-title">${p.title}</div><div class="r-excerpt">${p.excerpt}</div>`;
      card.addEventListener('click', () => window.location.href = p.url);
      resultsEl.appendChild(card);
    });
  });
</script>
</body>
</html>
