<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Catch-Up — test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a1a; --faint: #999; --rule: #e8e8e8;
      --bg: #fafaf8; --accent: #c8401a; --blue: #4169e1;
    }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--ink);
      font-family: 'Libre Baskerville', Georgia, serif;
    }

    .shell {
      display: grid;
      grid-template-columns: 200px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ── LEFT NAV ── */
    .post-list {
      border-right: 1px solid var(--rule);
      overflow-y: auto;
      scrollbar-width: none;
      padding: 2rem 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .post-list::-webkit-scrollbar { display: none; }

    .logo {
      font-family: 'Libre Baskerville', serif;
      font-size: 0.95rem; font-weight: 700; font-style: italic;
      line-height: 1.2; text-align: center;
      text-decoration: none; color: var(--ink);
      margin-bottom: 2rem; display: block;
    }

    .search-toggle {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem; font-weight: 300;
      color: var(--faint); letter-spacing: 0.08em;
      background: none; border: none; cursor: pointer;
      margin-bottom: 2rem; padding: 0;
      transition: color 0.15s;
    }
    .search-toggle:hover { color: var(--ink); }
    .search-toggle.active { color: var(--accent); }

    .post-list ul {
      list-style: none;
      display: flex; flex-direction: column;
      gap: 0.15rem; align-items: center;
      width: 100%;
    }

    .post-list li a {
      display: block; text-decoration: none;
      padding: 0.3rem 0; transition: opacity 0.15s;
    }
    .post-list li a:hover { opacity: 0.5; }
    .post-list li a.active .post-num { color: var(--accent); }

    .post-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem; font-weight: 300;
      color: var(--blue); letter-spacing: 0.05em;
      white-space: nowrap;
      text-decoration: underline; text-underline-offset: 2px;
    }
    .post-num-dead {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem; font-weight: 300;
      color: var(--rule); letter-spacing: 0.05em;
      display: block; padding: 0.3rem 0; cursor: default;
    }

    /* ── RIGHT PANEL ── */
    .main-panel {
      overflow-y: auto;
      scrollbar-width: none;
      position: relative;
    }
    .main-panel::-webkit-scrollbar { display: none; }

    /* Search overlay */
    .search-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 3rem;
      gap: 2.5rem;
      height: 100%;
    }
    .search-panel.visible { display: flex; }

    .search-box-wrap { width: 100%; max-width: 520px; }
    .search-box-wrap input {
      width: 100%;
      font-family: 'Libre Baskerville', serif;
      font-size: 1rem; font-style: italic;
      color: var(--ink); background: transparent;
      border: none; border-bottom: 1.5px solid var(--ink);
      padding: 0.6rem 0; outline: none;
      transition: border-color 0.2s;
    }
    .search-box-wrap input::placeholder { color: var(--faint); font-style: italic; }
    .search-box-wrap input:focus { border-bottom-color: var(--accent); }

    .results {
      width: 100%; max-width: 520px;
      display: flex; flex-direction: column;
      gap: 1.2rem; overflow-y: auto; scrollbar-width: none;
    }
    .results::-webkit-scrollbar { display: none; }

    .result-card {
      border-left: 2px solid var(--rule);
      padding-left: 1.2rem; cursor: pointer;
      transition: border-color 0.15s;
    }
    .result-card:hover { border-left-color: var(--accent); }
    .result-card .r-num {
      font-family: 'DM Mono', monospace; font-size: 0.6rem;
      font-weight: 300; color: var(--faint);
      letter-spacing: 0.08em; margin-bottom: 0.2rem;
    }
    .result-card .r-title {
      font-size: 0.92rem; font-weight: 700;
      color: var(--ink); margin-bottom: 0.3rem;
    }
    .result-card .r-excerpt {
      font-size: 0.78rem; color: var(--faint);
      line-height: 1.6; font-style: italic;
    }
    .no-results {
      font-family: 'DM Mono', monospace; font-size: 0.7rem;
      color: var(--faint); letter-spacing: 0.05em;
      text-align: center; display: none;
    }

    /* Post content */
    .post-panel {
      display: none;
      padding: 4rem 3rem 8rem;
      max-width: 680px;
      margin: 0 auto;
    }
    .post-panel.visible { display: block; }

    /* Default state — nothing selected */
    .empty-state {
      display: flex;
      align-items: center; justify-content: center;
      height: 100%;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem; font-weight: 300;
      color: var(--rule); letter-spacing: 0.08em;
    }

    /* Post typography (mirrors individual post pages) */
    .post-panel .post-meta {
      font-family: 'DM Mono', monospace; font-size: 0.62rem;
      font-weight: 300; color: var(--faint);
      letter-spacing: 0.08em; margin-bottom: 2rem;
    }
    .post-panel h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.6rem; font-weight: 700;
      line-height: 1.25; margin-bottom: 2rem;
    }
    .post-panel p {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem; line-height: 1.75; margin-bottom: 1.4rem;
    }
    .post-panel p.caption {
      font-family: 'DM Mono', monospace; font-size: 0.62rem;
      color: var(--faint); margin-top: -1rem;
      letter-spacing: 0.05em; margin-bottom: 1.4rem;
    }
    .post-panel em { font-style: italic; }
    .post-panel strong { font-weight: 700; }
    .post-panel a { color: var(--blue); text-underline-offset: 2px; }
    .post-panel img, .post-panel figure {
      width: 100%; margin: 2rem 0;
    }
    .post-panel blockquote {
      border-left: 2px solid var(--rule); padding-left: 1.2rem;
      margin: 1.5rem 0; color: var(--faint); font-style: italic;
    }
  </style>
</head>
<body>
<div class="shell">

  <nav class="post-list">
    <a href="/" class="logo">Catching<br>Up</a>
    <button class="search-toggle" id="searchToggle">search</button>
    <ul id="postList"></ul>
  </nav>

  <main class="main-panel" id="mainPanel">

    <div class="search-panel" id="searchPanel">
      <div class="search-box-wrap">
        <input type="text" id="searchInput" placeholder="Search the field notes…" autocomplete="off">
      </div>
      <div class="results" id="results"></div>
      <p class="no-results" id="noResults">No field notes found.</p>
    </div>

    <div class="post-panel" id="postPanel"></div>

    <div class="empty-state" id="emptyState">← pick a post</div>

  </main>

</div>

<script>
  const posts = [
    { id:"01", title:"Getting It", url:"posts/01-getting-it.html", summary:"The moment GenAI clicked — not as a tool but as something qualitatively different. The feeling of understanding something that can't quite be explained.", keywords:["click moment","understanding","superincreasing sequence","intuition","GenAI","getting it","revelation"] },
    { id:"02", title:"Innovative Laggard", url:"posts/02-innovative-laggard.html", summary:"Being late to GenAI relative to your Twitter feed but early relative to the world. The fractal nature of adoption curves.", keywords:["adoption curve","early adopter","laggard","Twitter","social graph","relative","timing"] },
    { id:"03", title:"Becoming Unbounded", url:"posts/03-becoming-unbounded.html", summary:"When AI removes the skill bottleneck, you're no longer limited by what you can do — only by what you can imagine.", keywords:["skill bottleneck","imagination","creativity","unbounded","execution","constraints","capability"] },
    { id:"04", title:"Egregores", url:"posts/04-egregores.html", summary:"What is a group mind, really? Using the card game The Mind as a live experiment in collective intelligence and silent coordination.", keywords:["egregore","group mind","hive","collective intelligence","cooperation","silent","tulpa","occult","meme"] },
    { id:"05", title:"Pixel Art Dreams", url:"posts/05-pixel-art-dreams.html", summary:"Midjourney bleeding into dreams and back. The model starts shaping how you see before you're even awake.", keywords:["dreams","freud","unconscious","sleep","perception","pixel art","midjourney","bleed","psyche","hallucination"] },
    { id:"06", title:"The Merge", url:"posts/06-the-merge.html", summary:"Failed projects combining into a natural save point. When the graveyard becomes the foundation.", keywords:["failure","projects","save point","merge","graveyard","foundation","hellboy","mignola"] },
    { id:"07", title:"Bricoleur", url:"posts/07-bricoleur.html", summary:"Scraps of failed projects becoming successful ones. The French concept of making do with what's at hand.", keywords:["bricolage","bricoleur","making do","scraps","repurpose","creativity","levi-strauss","improvise"] },
    { id:"08", title:"History of Creativity", url:"posts/08-history-of-creativity.html", summary:"Midjourney already contains the creative lineage you wanted to trace. The whole loop is already inside.", keywords:["creativity","history","lineage","canon","training data","inheritance","loop","tradition"] },
    { id:"09", title:"Seeing like a Prompter", url:"posts/09-seeing-like-a-prompter.html", summary:"Perceiving the world as potential prompts. A new perceptual filter that changes what you notice.", keywords:["perception","prompting","seeing","midjourney","filter","awareness","attention","framing","observe"] },
    { id:"10", title:"We Are All Kids Now", url:"posts/10-we-are-all-kids-now.html", summary:"Thomas Romain turned his kid's doodles into anime. Now AI does that for everyone. The execution gap is closed.", keywords:["kids","children","doodle","anime","thomas romain","father","imagination","execute","play","innocent"] },
    { id:"11", title:"Oneshotting", url:"posts/11-oneshotting.html", summary:"The calibration reflex — just try the hard thing first. The cost of asking has collapsed.", keywords:["oneshot","calibration","reflex","easy hard","cost","try","ask","attempt","boldness"] },
    { id:"12", title:"Someday/Maybe", url:"posts/12-someday-maybe.html", summary:"Dead ideas resurrected by AI. The Dunkinator lives. Someday/Maybe has arrived.", keywords:["resurrection","dead ideas","dunkinator","someday maybe","GTD","backlog","revival","graveyard"] },
    { id:"13", title:"Breadcrumbs", url:"posts/13-breadcrumbs.html", summary:"Borges as proxy-executor of ideas you couldn't yet build. AI as the reader who finally completes the text.", keywords:["Borges","ideas","execution","proxy","worlds","simulation","literature","breadcrumbs"] },
    { id:"14", title:"Blue Light", url:"posts/14-blue-light.html", summary:"Dreams to Midjourney to game concept to Claude mockup. The creative chain that runs through sleep.", keywords:["dreams","midjourney","game","mockup","claude","blue light","screen","zombie","entranced"] },
    { id:"15", title:"A 4000 Year Run", url:"posts/15-a-4000-year-run.html", summary:"The canon is now finite. Everything ever written is inside the model. So I started at the beginning.", keywords:["canon","literature","finite","chatgpt","reading","bible","beginning","4000 year run","classics"] },
    { id:"16", title:"The Studio", url:"posts/16-the-studio.html", summary:"Jeff Koons doesn't make his art — he directs it. Disappointing until you realize AI makes us all PMs now.", keywords:["studio","jeff koons","product manager","pm","artist","creative direction","factory","we are all pms now"] },
    { id:"17", title:"Emoji Sigils", url:"posts/17-emoji-sigils.html", summary:"Compressing entire narratives into emoji sequences. The Iliad in four rows. A new kind of literary shorthand.", keywords:["emoji","sigil","compress","story","iliad","odyssey","hamlet","symbol","bible","narrative","glyph"] },
    { id:"18", title:"Reading Simulator 9000", url:"posts/18-reading-simulator-9000.html", summary:"The opportunity cost of finishing books you're not sure about. A fictional device for outsourcing that decision.", keywords:["reading","simulator","book","finish","opportunity cost","guilt","taste","simulation","abandon"] },
    { id:"19", title:"MVC", url:"posts/19-mvc.html", summary:"Minimum viable creativity. Borges, Hemingway's baby shoes, and the question of how little is enough.", keywords:["mvc","minimum viable creativity","borges","hemingway","baby shoes","brevity","six words","enough"] },
    { id:"20", title:"Cambrian Explosion", url:"posts/20-cambrian-explosion.html", summary:"The internet was wild, then platforms flattened it. AI is lowering the cost of making again.", keywords:["cambrian explosion","internet","platform","creativity","skill barrier","wild west","geocities","flatten"] },
    { id:"21", title:"Single-player Mode", url:"posts/21-single-player-mode.html", summary:"A solo operator with AI can now do what previously required a small company. Pieter Levels was just early.", keywords:["solo","startup","single player","pieter levels","headcount","one person","indie","org chart"] },
    { id:"22", title:"Bespoke Software", url:"posts/22-bespoke-software.html", summary:"Why use software built for the modal user when you can build exactly what you need? Claude Code makes this real.", keywords:["bespoke software","claude code","obsidian","custom","modal user","build your own tool","tailored"] },
    { id:"23", title:"Stewie Was Wrong", url:"posts/23-stewie-was-wrong.html", summary:"Stewie Griffin thought curation was a cop-out. But a Midjourney prompt is exactly 'a pinch of this, a pinch of that'.", keywords:["curation","creativity","taste","archive","midjourney","family guy","stewie","pinterest","collection"] },
    { id:"24", title:"Inverse Science", url:"posts/24-inverse-science.html", summary:"Classical science: observe, theorize, build. AI inverts this — build first, discover later. We made it without understanding it.", keywords:["science","ai","inverse","black box","emergence","hypothesis","interpretability","discover"] },
    { id:"25", title:"The Prompter Is the Prompted", url:"posts/25-the-prompter-is-the-prompted.html", summary:"Every image you generate in Midjourney changes what you prompt next. The tool is prompting you back.", keywords:["prompt","feedback loop","midjourney","reciprocal","dialogue","two-way","influence","reverse"] },
    { id:"26", title:"Scriptorium", url:"posts/26-scriptorium.html", summary:"Medieval monks illuminated manuscripts to make knowledge beautiful. Claude can do that now. Why not?", keywords:["aristotle","illuminated manuscript","scriptorium","medieval monks","gold","vellum","beauty","philosophy"] },
    { id:"27", title:"Dying by Inches", url:"posts/27-dying-by-inches.html", summary:"Darwin was dying by inches without anyone to talk insects with. That's how GenAI feels — no campfire, no community.", keywords:["darwin","community","campfire","midjourney","metis","forum","lonely","tribe","naturalist"] },
    { id:"28", title:"Imaginal Amputees", url:"posts/28-imaginal-amputees.html", summary:"For the first time in history imagination is no longer the bottleneck. We were all imaginal amputees and didn't know it.", keywords:["imagination","skill","childhood","bottleneck","amputee","execution","human history","dream","limit"] },
    { id:"29", title:"Is It Still There?", url:"posts/29-is-it-still-there.html", summary:"A fiction: digital books can be silently edited. Paper becomes incorruptible. Borges, Orwell, Lisbon.", keywords:["fiction","censorship","digital","paper","borges","lisbon","memory","truth","disappear","1984","orwell"] },
    { id:"30", title:"Original Sin", url:"posts/30-original-sin.html", summary:"Anthropic accused labs of stealing training data. The internet sided with the thieves. Illegal but not immoral?", keywords:["anthropic","ip","copyright","training data","deepseek","morality","theft","original sin","piracy"] },
    { id:"31", title:"Midjourney Gospel", url:"posts/31-midjourney-gospel.html", summary:"Ten commandments for working with generative AI. Non-attachment, grace, letting go of outcomes.", keywords:["commandment","gospel","midjourney","non-attachment","zen","grace","religion","bible","discipline","detach"] }
  ];

  // ── RENDER LEFT NAV ──
  const listEl = document.getElementById('postList');
  const published = {};
  posts.forEach(p => { published[p.id] = p; });

  for (let i = 99; i >= 1; i--) {
    const id = String(i).padStart(2, '0');
    const li = document.createElement('li');
    if (published[id]) {
      li.innerHTML = `<a href="#" data-id="${id}"><span class="post-num">#${id}</span></a>`;
    } else {
      li.innerHTML = `<span class="post-num-dead">#${id}</span>`;
    }
    listEl.appendChild(li);
  }

  // scroll to bottom (#01)
  const postListEl = document.querySelector('.post-list');
  postListEl.scrollTop = postListEl.scrollHeight;

  // ── STATE ──
  let activeId = null;
  let searchOpen = false;

  const mainPanel   = document.getElementById('mainPanel');
  const searchPanel = document.getElementById('searchPanel');
  const postPanel   = document.getElementById('postPanel');
  const emptyState  = document.getElementById('emptyState');
  const searchToggle = document.getElementById('searchToggle');

  function showEmpty() {
    searchPanel.classList.remove('visible');
    postPanel.classList.remove('visible');
    emptyState.style.display = 'flex';
    searchOpen = false;
    searchToggle.classList.remove('active');
  }

  function showSearch() {
    postPanel.classList.remove('visible');
    emptyState.style.display = 'none';
    searchPanel.classList.add('visible');
    searchOpen = true;
    searchToggle.classList.add('active');
    document.getElementById('searchInput').focus();
  }

  function showPost(id) {
    searchPanel.classList.remove('visible');
    emptyState.style.display = 'none';
    searchOpen = false;
    searchToggle.classList.remove('active');

    // highlight active number
    document.querySelectorAll('.post-list li a').forEach(a => a.classList.remove('active'));
    const activeLink = document.querySelector(`.post-list li a[data-id="${id}"]`);
    if (activeLink) activeLink.classList.add('active');

    // Only #01 is wired for this test
    if (id === '01') {
      postPanel.innerHTML = `
        <p class="post-meta">#01</p>
        <h1>Getting It</h1>
        <p>It's March 2026 and I finally got why everyone is so excited about GenAI.</p>
        <p>Lifetimes ago I worked in crypto. Marketing. We had to cater to Crypto Twitter, which is how I learned about Twitter in the first place.</p>
        <p>Later, bored and out of a job, I decided to make my own Twitter account. You could say I got into it.</p>
        <figure><img src="assets/images/image19.png" alt=""></figure>
        <p class="caption">Getting into Twitter. Made with Claude Code.</p>
        <p>More recently, this time because of Twitter, <a href="https://rivalvoices.substack.com/p/my-work-with-chris-lakin">I got a gig in comms</a> — lots of helping with blog posts. Through that gig I learned about Midjourney, which we were using to try to make illustrations for the posts.</p>
        <p>And Midjourney, a genAI image creation engine, is the reason I "got" it.</p>
        <p>At some point — this very month, in fact — I just "got it".</p>
        <figure><img src="assets/images/image30.png" alt=""></figure>
        <p class="caption">March 2026 — I "get it". Made with Claude Code.</p>
        <p>The same way that you can see that when I "got" Twitter I produced more in one month than ever produced before, when I "got" Midjourney I produced more in one month than ever before.</p>
        <figure><img src="assets/images/image19-30-combined.png" alt=""></figure>
        <p class="caption">Twitter — first 5 months vs Midjourney — first 7 months. Made with Claude Code.</p>
        <p>This pattern — where each term is bigger than the sum of all previous terms — is known as a "superincreasing sequence". Or so AI tells me.</p>
        <p>And, apparently, it's what it looks like when I get something</p>
      `;
    } else {
      postPanel.innerHTML = `<p class="post-meta">#${id}</p><h1>${published[id]?.title || ''}</h1><p style="color:var(--faint);font-style:italic">— not wired in this test —</p>`;
    }

    postPanel.classList.add('visible');
    mainPanel.scrollTop = 0;
    activeId = id;
  }

  // ── CLICK HANDLERS ──
  listEl.addEventListener('click', e => {
    e.preventDefault();
    const a = e.target.closest('a[data-id]');
    if (!a) return;
    const id = a.dataset.id;
    if (id === activeId && !searchOpen) return;
    showPost(id);
  });

  searchToggle.addEventListener('click', () => {
    if (searchOpen) showEmpty();
    else showSearch();
  });

  // ── SEARCH ──
  function score(post, q) {
    const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
    let s = 0;
    terms.forEach(t => {
      if (post.title.toLowerCase().includes(t)) s += 12;
      if ((post.summary||'').toLowerCase().includes(t)) s += 5;
      (post.keywords||[]).forEach(k => {
        if (k === t) s += 5;
        else if (k.includes(t)) s += 2;
      });
    });
    return s;
  }

  document.getElementById('searchInput').addEventListener('input', e => {
    const q = e.target.value.trim();
    const resultsEl = document.getElementById('results');
    const noResults = document.getElementById('noResults');
    resultsEl.innerHTML = '';
    noResults.style.display = 'none';
    if (!q) return;

    const scored = posts
      .map(p => ({ post: p, s: score(p, q) }))
      .filter(x => x.s > 0)
      .sort((a, b) => b.s - a.s)
      .slice(0, 4);

    if (!scored.length) { noResults.style.display = 'block'; return; }

    scored.forEach(({ post: p }) => {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `<div class="r-num">#${p.id}</div><div class="r-title">${p.title}</div><div class="r-excerpt">${p.summary||''}</div>`;
      card.addEventListener('click', () => showPost(p.id));
      resultsEl.appendChild(card);
    });
  });
</script>
</body>
</html>
